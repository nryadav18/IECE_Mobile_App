# render.yaml — Render Blueprint for IECE ML Service (v2)
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this project to a GitHub / GitLab repo.
#   2. In Render Dashboard → New → Blueprint → connect your repo.
#   3. Render will detect this file and auto-create the service below.

services:
  - type: web
    name: iece-ml-service
    runtime: python
    region: singapore           # closest to India — change to 'oregon' if needed

    # ── Root directory ──────────────────────────────────────────────────────
    # Render will cd into this folder before running build / start commands.
    rootDir: ml_service

    # ── Build ───────────────────────────────────────────────────────────────
    buildCommand: pip install -r requirements_v3.txt

    # ── Start ───────────────────────────────────────────────────────────────
    # $PORT is injected by Render automatically.
    startCommand: uvicorn main_v2:app --host 0.0.0.0 --port $PORT

    # ── Plan ────────────────────────────────────────────────────────────────
    plan: starter

    # ── Health check ────────────────────────────────────────────────────────
    healthCheckPath: /

    # ── Environment variables ────────────────────────────────────────────────
    envVars:
      # Belt-and-suspenders Python version pin.
      # The .python-version file in ml_service/ is the primary control;
      # this env var is a fallback for Render's build environment.
      - key: PYTHON_VERSION
        value: "3.11.9"
      # InsightFace caches model weights here.
      # On free/starter plan this resets on every deploy.
      # On a paid plan, attach a Render Disk and point INSIGHTFACE_HOME to it.
      - key: INSIGHTFACE_HOME
        value: /opt/render/.insightface
